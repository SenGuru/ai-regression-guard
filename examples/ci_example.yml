# Example GitHub Actions workflow
# Copy this to .github/workflows/ai-regression-check.yml

name: AI Regression Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ai-regression-test:
    runs-on: ubuntu-latest
    name: Check AI Output Quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check AI Regression (with real LLM)
        uses: ./ci/github_action
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          command: 'check'
          suite-path: 'examples/suite.json'
          provider: 'openai'
          model: 'gpt-4'
          baseline-path: '.baselines'
          threshold: '0.10'

